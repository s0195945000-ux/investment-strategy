html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

.rw{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}.rw:last-child{border-bottom:none}

.bd{padding:6px 12px;border-radius:7px;border:1px solid rgba(239,68,68,.2);background:transparent;color:var(--r);font-size:10px;cursor:pointer;font-family:inherit}

.fd{margin-bottom:14px}.fd label{font-size:11px;color:var(--sub);margin-bottom:5px;display:block;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cr{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.cc{flex:1;min-width:220px}
.cw{position:relative;width:100%;max-width:200px;margin:0 auto}
.lg{display:flex;flex-wrap:wrap;gap:3px 12px;justify-content:center;margin-top:6px}.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#aaa}.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}

.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03)}

.sig{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:16px}
.sig-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.sig-card.buy-strong{border-left:3px solid var(--g)}
.sig-card.buy{border-left:3px solid var(--y)}
.sig-card.wait{border-left:3px solid var(--dim)}
.sig-label{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.sig-label.strong{background:rgba(16,185,129,.15);color:var(--g)}
.sig-label.normal{background:rgba(245,158,11,.15);color:var(--y)}
.sig-label.waiting{background:rgba(85,85,85,.2);color:#888}
.sig-val{font-size:22px;font-weight:800;margin:4px 0}
.sig-name{font-size:12px;font-weight:700;color:#ccc}
.sig-desc{font-size:10px;color:#666;margin-top:4px}
.sig-rec{font-size:11px;font-weight:600;margin-top:8px;padding:6px 10px;border-radius:6px;background:rgba(255,255,255,.03)}
/* Setup */
.sw{max-width:540px;margin:60px auto;padding:0 20px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:14px}
.st{display:flex;gap:10px;margin-bottom:18px;align-items:flex-start}
.sn{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#6366F1);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sx{font-size:12px;line-height:1.7;color:#ccc}.sx a{color:var(--b)}.sx code{background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--y)}
.tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.tbl th{text-align:left;padding:6px 8px;color:var(--sub);font-weight:600;border-bottom:1px solid var(--border);font-size:10px}
.tbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.02)}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
@media(max-width:480px){.tv{font-size:24px}.sig{grid-template-columns:1fr}.sc{padding:20px}.g2{grid-template-columns:1fr}}
</style>

return{tV:tV,tC:tC,tG:tV-tC,tP:tC>0?((tV-tC)/tC*100):0,bA:bA,ow:ow,ty:ty,tk:tk}}
