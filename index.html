function calc(){
  var A=S.a;if(!A.length)return{tV:0,tC:0,tG:0,tP:0,bA:[],ow:[],ty:[],tk:[],risk:{}};
  var tV=0,tC=0;A.forEach(function(a){tV+=vl(a);tC+=cs(a)});

  var ty=Object.keys(tm).map(function(t){var d=tm[t];return{type:t,color:TC[t]||"#888",value:d.v,pct:d.c>0?((d.v-d.c)/d.c*100):0}}).sort(function(a,b){return b.value-a.value});
  var risk={safe:0,dividend:0,growth:0,high:0};
  A.forEach(function(a){var r=riskOf(a.code);risk[r]=(risk[r]||0)+vl(a)});
  risk.safe+=(S.cma||0);
  var km={};A.forEach(function(a){if(!km[a.code])km[a.code]={code:a.code,name:a.name,type:a.type,tV:0,tC:0,ac:[]};km[a.code].tV+=vl(a);km[a.code].tC+=cs(a);var x=ga(a.acct);km[a.code].ac.push({l:x.name+"("+x.owner+")",qty:a.qty,cur:a.cur})});

/* Charts */
function dC(d){
  ["cR","c1"].forEach(function(id){var el=document.getElementById(id);if(el){var ex=Chart.getChart(el);if(ex)ex.destroy()}});

  if(xR){var rk=d.risk,keys=["safe","dividend","growth","high"],vals=keys.map(function(k){return Math.round(rk[k]||0)}),cols=keys.map(function(k){return RISK_META[k].color}),labs=keys.map(function(k){return RISK_META[k].name});
    new Chart(xR,{type:"doughnut",data:{labels:labs,datasets:[{data:vals,backgroundColor:cols,borderWidth:0}]},options:{cutout:"62%",plugins:{legend:{display:false},tooltip:{callbacks:{label:function(i){return i.label+": \u20A9"+fS(i.raw)}}}},responsive:true,maintainAspectRatio:true}})}
