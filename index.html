@media(max-width:480px){.tv{font-size:22px}.sig{grid-template-columns:1fr}.sc{padding:18px}.g2{grid-template-columns:1fr}.cr{flex-direction:column}}

risk.safe+=(S.cma||0); /* CMA is safe */

var tk=Object.keys(km).map(function(k){return km[k]}).sort(function(a,b){return b.tV-a.tV}).map(function(t){t.pct=t.tC>0?((t.tV-t.tC)/t.tC*100):0;return t});
